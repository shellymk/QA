<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetAI — Reuniões Gravadas</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  #new-meeting-banner {
    display:none; background:linear-gradient(90deg,#1a0a3e,#2d1a6e);
    border:1px solid #6D28D9; border-radius:10px; padding:14px 20px;
    margin-bottom:20px; font-size:14px; color:#C4B5FD;
    align-items:center; gap:12px; animation:slideIn 0.4s ease;
  }
  #new-meeting-banner.visible { display:flex; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  #new-meeting-banner button {
    margin-left:auto; background:#7C3AED; color:white; border:none;
    padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600;
  }
  .meetings-toolbar {
    display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;
  }
  .meetings-toolbar input {
    background:#1E1E2E; border:1px solid #334155; color:#E5E7EB;
    padding:8px 14px; border-radius:8px; font-size:13px; flex:1; min-width:200px; outline:none;
  }
  .meetings-toolbar input:focus { border-color:#8B5CF6; }
  .meetings-toolbar select {
    background:#1E1E2E; border:1px solid #334155; color:#94A3B8;
    padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; outline:none;
  }
  .filter-count { font-size:12px; color:#4B5563; margin-left:auto; }
  .selection-bar {
    display:none; align-items:center; gap:10px;
    background:rgba(139,92,246,0.08); border:1px solid rgba(139,92,246,0.25);
    border-radius:10px; padding:10px 16px; margin-bottom:14px; flex-wrap:wrap;
  }
  .selection-bar.visible { display:flex; }
  .selection-count { font-size:13px; color:#8B5CF6; font-weight:600; margin-right:auto; }
  .btn-sel {
    padding:6px 14px; border-radius:8px; font-size:12px;
    font-weight:600; border:none; cursor:pointer; transition:0.15s;
  }
  .btn-sel-all  { background:#1E1E2E; color:#9CA3AF; border:1px solid #374151; }
  .btn-sel-all:hover { color:#E5E7EB; }
  .btn-sel-del  { background:rgba(239,68,68,0.1); color:#F87171; border:1px solid rgba(239,68,68,0.3); }
  .btn-sel-del:hover { background:rgba(239,68,68,0.2); }
  .btn-sel-clear { background:transparent; color:#6B7280; border:1px solid #374151; }
  .btn-sel-clear:hover { color:#9CA3AF; }
  .meeting-card { display:flex; align-items:flex-start; gap:12px; }
  .meeting-card.selected { border-color:rgba(139,92,246,0.4); background:rgba(139,92,246,0.04); }
  .meeting-cb {
    appearance:none; -webkit-appearance:none;
    width:17px; height:17px; border:2px solid #4B5563; border-radius:5px;
    cursor:pointer; flex-shrink:0; margin-top:3px; transition:all 0.15s; position:relative;
  }
  .meeting-cb:checked { background:#8B5CF6; border-color:#8B5CF6; }
  .meeting-cb:checked::after {
    content:''; position:absolute; left:3px; top:0px;
    width:5px; height:9px; border:2px solid white;
    border-top:none; border-left:none; transform:rotate(45deg);
  }
  .meeting-participants { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .participant-chip {
    background:#1a1a2e; border:1px solid #2D2B55;
    color:#A5B4FC; font-size:11px; padding:2px 8px; border-radius:20px;
  }
  .live-dot {
    display:inline-block; width:8px; height:8px; background:#EF4444;
    border-radius:50%; margin-right:4px; animation:blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .transcript-count {
    font-size:11px; color:#6B7280; background:#111827; padding:2px 8px; border-radius:12px;
  }
</style>
</head>
<body>
<div class="app">
  <div id="sidebar"></div>
  <main class="main">
    <div id="header"></div>
    <div id="new-meeting-banner">
      <span>🎉</span>
      <span id="banner-text">Uma reunião foi concluída.</span>
      <button onclick="reloadMeetings()">Atualizar lista</button>
      <button onclick="document.getElementById('new-meeting-banner').classList.remove('visible')"
        style="background:transparent;border:1px solid #6D28D9;color:#A5B4FC;margin-left:4px">✕</button>
    </div>
    <div class="meetings-toolbar">
      <input id="search-meetings" type="text" placeholder="🔍 Buscar por título, código ou participante...">
      <select id="filter-status">
        <option value="all">Todas</option>
        <option value="done">Concluídas</option>
        <option value="live">Ao vivo</option>
      </select>
      <span class="filter-count" id="filter-count"></span>
    </div>
    <div class="selection-bar" id="selection-bar">
      <span class="selection-count" id="selection-count">0 selecionada(s)</span>
      <button class="btn-sel btn-sel-all" id="btn-select-all">☑ Selecionar todas</button>
      <button class="btn-sel btn-sel-del" id="btn-delete-sel">🗑 Excluir selecionadas</button>
      <button class="btn-sel btn-sel-clear" id="btn-clear-sel">✕ Cancelar</button>
    </div>
    <div id="meetings-container"><div class="loading">Carregando reuniões...</div></div>
    <div id="pagination" class="pagination"></div>
  </main>
</div>

<script type="module">
import { renderSidebar } from '../components/sidebar.js';
import { renderHeader }  from '../components/header.js';
import { API_URL }       from '../js/config.js';

document.getElementById('sidebar').innerHTML = renderSidebar('meetings');
document.getElementById('header').innerHTML  = renderHeader('Reuniões Gravadas');

let currentPage = 1, allMeetings = [], searchQuery = '', statusFilter = 'all';

async function loadMeetings(page = 1) {
  const container = document.getElementById('meetings-container');
  container.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const res = await fetch(`${API_URL}/api/meetings?page=${page}&limit=20`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    allMeetings = data.meetings || data;
    currentPage = page;
    applyFilters();
    if (data.totalPages > 1) renderPagination(data.page, data.totalPages);
  } catch {
    container.innerHTML = `<div class="error-msg">❌ Servidor indisponível em <strong>${API_URL}</strong></div>`;
  }
}

function applyFilters() {
  let list = [...allMeetings];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(m =>
      (m.title||'').toLowerCase().includes(q) ||
      (m.meetingCode||'').toLowerCase().includes(q) ||
      (m.participants||[]).some(p => p.toLowerCase().includes(q))
    );
  }
  if (statusFilter === 'done') list = list.filter(m => m.finishedAt || m.status === 'finished');
  if (statusFilter === 'live') list = list.filter(m => !m.finishedAt && m.status === 'live');
  document.getElementById('filter-count').innerText =
    list.length !== allMeetings.length ? `${list.length} de ${allMeetings.length}` : `${list.length} reunião(ões)`;
  renderMeetings(list);
}

function renderMeetings(meetings) {
  const container = document.getElementById('meetings-container');
  if (!meetings.length) { container.innerHTML = '<div class="empty-msg">Nenhuma reunião encontrada.</div>'; return; }

  let html = '<div class="meetings-list">';
  meetings.forEach(m => {
    const date     = new Date(m.createdAt).toLocaleString('pt-BR');
    const duration = m.duration ? `${Math.round(m.duration)} min` : 'Em andamento';
    const isLive   = !m.finishedAt && m.status === 'live';
    const txCount  = m.transcripts?.length || 0;
    const statusBadge = isLive
      ? `<span class="badge badge-live"><span class="live-dot"></span>Ao vivo</span>`
      : `<span class="badge badge-done">✓ Concluída</span>`;
    const parts = (m.participants||[]).slice(0,5).map(p=>`<span class="participant-chip">👤 ${escHtml(p)}</span>`).join('');
    const moreP = m.participants?.length > 5 ? `<span class="participant-chip">+${m.participants.length-5}</span>` : '';
    const participants = m.participants?.length ? `<div class="meeting-participants">${parts}${moreP}</div>` : '';

    html += `
      <div class="meeting-card" data-id="${m._id}">
        <input type="checkbox" class="meeting-cb" data-id="${m._id}">
        <div class="meeting-info" style="flex:1">
          <div class="meeting-title">
            ${escHtml(m.title||'Reunião')} ${statusBadge}
            ${txCount > 0 ? `<span class="transcript-count">💬 ${txCount} falas</span>` : ''}
          </div>
          <div class="meeting-meta">
            📅 ${date} &nbsp;·&nbsp; ⏱ ${duration}
            ${m.meetingCode ? `&nbsp;·&nbsp; 🔗 <code style="font-size:11px;color:#8B5CF6">${m.meetingCode}</code>` : ''}
          </div>
          ${participants}
        </div>
        <div class="meeting-actions">
          <a href="transcript.html?id=${m._id}" class="btn-primary">Ver transcrição</a>
          <button class="btn-danger btn-del-single" data-id="${m._id}">Excluir</button>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
  bindCardEvents();
}

function escHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function bindCardEvents() {
  document.querySelectorAll('.meeting-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('.meeting-card').classList.toggle('selected', cb.checked);
      updateSelectionBar();
    });
  });
  document.querySelectorAll('.btn-del-single').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Excluir esta reunião e todas as transcrições?')) return;
      btn.disabled = true; btn.innerText = '...';
      try {
        const res = await fetch(`${API_URL}/api/meeting/${btn.dataset.id}`, { method: 'DELETE' });
        if (res.ok) {
          btn.closest('.meeting-card').remove();
          allMeetings = allMeetings.filter(m => m._id !== btn.dataset.id);
          updateSelectionBar();
        } else { alert('Erro ao excluir'); btn.disabled = false; btn.innerText = 'Excluir'; }
      } catch { alert('Erro ao excluir'); btn.disabled = false; btn.innerText = 'Excluir'; }
    });
  });
}

function getSelectedIds() {
  return [...document.querySelectorAll('.meeting-cb:checked')].map(cb => cb.dataset.id);
}

function updateSelectionBar() {
  const sel = getSelectedIds();
  document.getElementById('selection-bar').classList.toggle('visible', sel.length > 0);
  document.getElementById('selection-count').innerText = `${sel.length} selecionada(s)`;
}

document.getElementById('btn-select-all').addEventListener('click', () => {
  const cbs = document.querySelectorAll('.meeting-cb');
  const allChecked = [...cbs].every(cb => cb.checked);
  cbs.forEach(cb => { cb.checked = !allChecked; cb.closest('.meeting-card').classList.toggle('selected', !allChecked); });
  updateSelectionBar();
});

document.getElementById('btn-clear-sel').addEventListener('click', () => {
  document.querySelectorAll('.meeting-cb').forEach(cb => { cb.checked = false; cb.closest('.meeting-card').classList.remove('selected'); });
  updateSelectionBar();
});

document.getElementById('btn-delete-sel').addEventListener('click', async () => {
  const ids = getSelectedIds();
  if (!ids.length) return;
  if (!confirm(`Excluir ${ids.length} reunião(ões) selecionada(s) e todas as suas transcrições?\n\nEsta ação não pode ser desfeita.`)) return;
  const btn = document.getElementById('btn-delete-sel');
  btn.disabled = true; btn.innerText = `Excluindo ${ids.length}...`;
  let ok = 0;
  await Promise.all(ids.map(async id => {
    try {
      const res = await fetch(`${API_URL}/api/meeting/${id}`, { method: 'DELETE' });
      if (res.ok) { ok++; document.querySelector(`.meeting-card[data-id="${id}"]`)?.remove(); allMeetings = allMeetings.filter(m => m._id !== id); }
    } catch(_) {}
  }));
  btn.disabled = false; btn.innerText = '🗑 Excluir selecionadas';
  updateSelectionBar();
  document.getElementById('filter-count').innerText = `${allMeetings.length} reunião(ões)`;
  if (ok < ids.length) alert(`${ok} de ${ids.length} excluídas.`);
});

function renderPagination(current, total) {
  const el = document.getElementById('pagination');
  let html = '';
  if (current > 1) html += `<button onclick="changePage(${current-1})">← Anterior</button>`;
  html += `<span>Página ${current} de ${total}</span>`;
  if (current < total) html += `<button onclick="changePage(${current+1})">Próxima →</button>`;
  el.innerHTML = html;
}
window.changePage = (page) => { loadMeetings(page); window.scrollTo(0,0); };
window.reloadMeetings = () => { document.getElementById('new-meeting-banner').classList.remove('visible'); loadMeetings(1); };

document.getElementById('search-meetings').addEventListener('input', e => { searchQuery = e.target.value.trim(); applyFilters(); });
document.getElementById('filter-status').addEventListener('change', e => { statusFilter = e.target.value; applyFilters(); });

function conectarSSE() {
  try {
    const es = new EventSource(`${API_URL}/api/events`);
    es.addEventListener('meetingEnded', (e) => {
      let meetingId = null;
      try { meetingId = JSON.parse(e.data).meetingId; } catch(_) {}
      if (meetingId) {
        const card = document.querySelector(`.meeting-card[data-id="${meetingId}"]`);
        if (card) { const b = card.querySelector('.badge-live'); if (b) b.outerHTML = `<span class="badge badge-done">✓ Concluída</span>`; }
        const m = allMeetings.find(x => x._id === meetingId || x._id?.toString() === meetingId);
        if (m) { m.status = 'finished'; m.finishedAt = new Date(); }
      }
      document.getElementById('new-meeting-banner').classList.add('visible');
      document.getElementById('banner-text').innerText = '✅ Uma reunião foi concluída!';
      window.scrollTo({ top:0, behavior:'smooth' });
    });
    // CORRECAO BAIXO 2: listener para novas transcricoes em tempo real
    es.addEventListener('newTranscripts', (e) => {
      try {
        const data = JSON.parse(e.data);
        const card = document.querySelector(`.meeting-card[data-id="${data.meetingId}"]`);
        if (card) {
          const counter = card.querySelector('.transcript-count');
          if (counter && data.count) {
            const cur = parseInt(counter.dataset.count || '0');
            counter.dataset.count = cur + data.count;
            counter.innerText = (cur + data.count) + ' falas';
          }
        }
      } catch(_) {}
    });
    // CORRECAO MEDIO 3: reconnect era 10000ms, reduzido para 3000ms
    es.onerror = () => { es.close(); setTimeout(conectarSSE, 3000); };
  } catch(_) {}
}

conectarSSE();
loadMeetings();
</script>
</body>
</html>
