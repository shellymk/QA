<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetAI — Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

  <div id="sidebar"></div>

  <main class="main">

    <div id="header"></div>

    <div id="dashboard" class="dashboard">
      <div class="loading">Carregando...</div>
    </div>

  </main>

</div>

<script type="module">

import { renderSidebar } from './components/sidebar.js';
import { renderHeader } from './components/header.js';
import { renderCard } from './components/card.js';
import { API_URL } from './js/config.js';

document.getElementById('sidebar').innerHTML = renderSidebar('dashboard');
document.getElementById('header').innerHTML = renderHeader('Dashboard');

async function loadDashboard() {
  try {

    const res = await fetch(`${API_URL}/api/analytics`);

    if (!res.ok) throw new Error('Servidor indisponível');

    const data = await res.json();

    document.getElementById('dashboard').innerHTML =
      renderCard('Reuniões', data.meetings, '📹') +
      renderCard('Horas gravadas', data.hours + 'h', '⏱') +
      renderCard('Participantes', data.users, '👥') +
      renderCard('Transcrições', data.transcripts, '📝');

  } catch (e) {
    document.getElementById('dashboard').innerHTML =
      `<div class="error-msg">❌ Não foi possível conectar ao servidor.<br>Verifique se o servidor está rodando em <strong>${API_URL}</strong></div>`;
  }
}

loadDashboard();

</script>

</body>
</html>
