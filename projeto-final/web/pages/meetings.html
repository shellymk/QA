<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetAI — Reuniões Gravadas</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  /* ── Banner de nova reunião ── */
  #new-meeting-banner {
    display: none;
    background: linear-gradient(90deg, #1a0a3e, #2d1a6e);
    border: 1px solid #6D28D9;
    border-radius: 10px;
    padding: 14px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #C4B5FD;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.4s ease;
  }
  #new-meeting-banner.hidden { display: none !important; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #new-meeting-banner button {
    margin-left: auto;
    background: #7C3AED;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  #new-meeting-banner button:hover { background: #6D28D9; }

  /* ── Filtro / busca ── */
  .meetings-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .meetings-toolbar input {
    background: #1E1E2E;
    border: 1px solid #334155;
    color: #E5E7EB;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    min-width: 200px;
    outline: none;
  }
  .meetings-toolbar input:focus { border-color: #8B5CF6; }
  .meetings-toolbar select {
    background: #1E1E2E;
    border: 1px solid #334155;
    color: #94A3B8;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .filter-count {
    font-size: 12px;
    color: #4B5563;
    margin-left: auto;
  }

  /* ── Participantes no card ── */
  .meeting-participants {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .participant-chip {
    background: #1a1a2e;
    border: 1px solid #2D2B55;
    color: #A5B4FC;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* ── Live dot animation ── */
  .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #EF4444;
    border-radius: 50%;
    margin-right: 4px;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Contador de falas ── */
  .transcript-count {
    font-size: 11px;
    color: #6B7280;
    background: #111827;
    padding: 2px 8px;
    border-radius: 12px;
  }
</style>
</head>

<body>

<div class="app">

  <div id="sidebar"></div>

  <main class="main">

    <div id="header"></div>

    <!-- Banner aparece quando uma reunião termina em tempo real -->
    <div id="new-meeting-banner" class="hidden">
      <span>🎉</span>
      <span id="banner-text">Uma reunião foi concluída e adicionada à lista.</span>
      <button onclick="reloadMeetings()">Atualizar lista</button>
      <button onclick="document.getElementById('new-meeting-banner').classList.add('hidden')"
              style="background:transparent;border:1px solid #6D28D9;color:#A5B4FC;margin-left:4px">✕</button>
    </div>

    <!-- Barra de filtro -->
    <div class="meetings-toolbar">
      <input id="search-meetings" type="text" placeholder="🔍 Buscar por título ou código...">
      <select id="filter-status">
        <option value="all">Todas</option>
        <option value="done">Concluídas</option>
        <option value="live">Ao vivo</option>
      </select>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <div id="meetings-container">
      <div class="loading">Carregando reuniões...</div>
    </div>

    <div id="pagination" class="pagination"></div>

  </main>

</div>

<script type="module">

import { renderSidebar } from '../components/sidebar.js';
import { renderHeader }  from '../components/header.js';
import { API_URL }       from '../js/config.js';

document.getElementById('sidebar').innerHTML = renderSidebar('meetings');
document.getElementById('header').innerHTML  = renderHeader('Reuniões Gravadas');

let currentPage  = 1;
let allMeetings  = [];   // cache para filtro local
let searchQuery  = '';
let statusFilter = 'all';

// ── CARREGAR REUNIÕES ─────────────────────────────────────
async function loadMeetings(page = 1) {
  const container = document.getElementById('meetings-container');
  container.innerHTML = '<div class="loading">Carregando...</div>';

  try {
    const res = await fetch(`${API_URL}/api/meetings?page=${page}&limit=20`);
    if (!res.ok) throw new Error('Erro ao carregar');

    const data      = await res.json();
    allMeetings     = data.meetings || data;
    currentPage     = page;

    applyFilters();

    if (data.totalPages > 1) renderPagination(data.page, data.totalPages);

  } catch (e) {
    container.innerHTML = `<div class="error-msg">❌ Erro ao carregar reuniões. Servidor disponível em <strong>${API_URL}</strong>?</div>`;
  }
}

// ── FILTROS ───────────────────────────────────────────────
function applyFilters() {
  let list = [...allMeetings];

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(m =>
      (m.title || '').toLowerCase().includes(q) ||
      (m.meetingCode || '').toLowerCase().includes(q) ||
      (m.participants || []).some(p => p.toLowerCase().includes(q))
    );
  }

  if (statusFilter === 'done') list = list.filter(m => !!m.finishedAt);
  if (statusFilter === 'live') list = list.filter(m => !m.finishedAt);

  document.getElementById('filter-count').innerText =
    list.length !== allMeetings.length
      ? `${list.length} de ${allMeetings.length} reuniões`
      : `${list.length} reunião(ões)`;

  renderMeetings(list);
}

// ── RENDERIZAR CARDS ──────────────────────────────────────
function renderMeetings(meetings) {
  const container = document.getElementById('meetings-container');

  if (!meetings.length) {
    container.innerHTML = '<div class="empty-msg">Nenhuma reunião encontrada.</div>';
    return;
  }

  let html = '<div class="meetings-list">';

  meetings.forEach(m => {
    const date      = new Date(m.createdAt).toLocaleString('pt-BR');
    const duration  = m.duration ? `${Math.round(m.duration)} min` : 'Em andamento';
    const isLive    = !m.finishedAt;
    const txCount   = (m.transcripts?.length || 0);

    const statusBadge = isLive
      ? `<span class="badge badge-live"><span class="live-dot"></span>Ao vivo</span>`
      : `<span class="badge badge-done">✓ Concluída</span>`;

    // Participantes como chips
    const participants = m.participants?.length
      ? `<div class="meeting-participants">
           ${m.participants.slice(0, 5).map(p => `<span class="participant-chip">👤 ${escHtml(p)}</span>`).join('')}
           ${m.participants.length > 5 ? `<span class="participant-chip">+${m.participants.length - 5}</span>` : ''}
         </div>`
      : '';

    html += `
      <div class="meeting-card">
        <div class="meeting-info">
          <div class="meeting-title">
            ${escHtml(m.title || 'Reunião')}
            ${statusBadge}
            ${txCount > 0 ? `<span class="transcript-count">💬 ${txCount} falas</span>` : ''}
          </div>
          <div class="meeting-meta">
            📅 ${date}
            &nbsp;·&nbsp; ⏱ ${duration}
            ${m.meetingCode ? `&nbsp;·&nbsp; 🔗 <code style="font-size:11px;color:#8B5CF6">${m.meetingCode}</code>` : ''}
          </div>
          ${participants}
        </div>
        <div class="meeting-actions">
          <a href="transcript.html?id=${m._id}" class="btn-primary">Ver transcrição</a>
          <button class="btn-danger" onclick="deleteMeeting('${m._id}', this)">Excluir</button>
        </div>
      </div>
    `;
  });

  html += '</div>';
  container.innerHTML = html;
}

function escHtml(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── PAGINAÇÃO ─────────────────────────────────────────────
function renderPagination(current, total) {
  const el = document.getElementById('pagination');
  let html = '';
  if (current > 1) html += `<button onclick="changePage(${current - 1})">← Anterior</button>`;
  html += `<span>Página ${current} de ${total}</span>`;
  if (current < total) html += `<button onclick="changePage(${current + 1})">Próxima →</button>`;
  el.innerHTML = html;
}

window.changePage = (page) => { loadMeetings(page); window.scrollTo(0,0); };

// ── EXCLUIR ───────────────────────────────────────────────
window.deleteMeeting = async (id, btn) => {
  if (!confirm('Excluir esta reunião e todas as transcrições?')) return;
  btn.disabled = true; btn.innerText = '...';
  try {
    const res = await fetch(`${API_URL}/api/meeting/${id}`, { method: 'DELETE' });
    if (res.ok) {
      btn.closest('.meeting-card').remove();
      // Atualiza contagem
      allMeetings = allMeetings.filter(m => m._id !== id);
      document.getElementById('filter-count').innerText = `${allMeetings.length} reunião(ões)`;
    } else {
      alert('Erro ao excluir'); btn.disabled = false; btn.innerText = 'Excluir';
    }
  } catch { alert('Erro ao excluir'); btn.disabled = false; btn.innerText = 'Excluir'; }
};

// ── RELOAD (chamado pelo banner) ──────────────────────────
window.reloadMeetings = () => {
  document.getElementById('new-meeting-banner').classList.add('hidden');
  loadMeetings(1);
};

// ── FILTROS: eventos de input ─────────────────────────────
document.getElementById('search-meetings').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  applyFilters();
});

document.getElementById('filter-status').addEventListener('change', e => {
  statusFilter = e.target.value;
  applyFilters();
});

// ── SSE — ATUALIZAÇÃO AUTOMÁTICA ──────────────────────────
// Quando uma reunião termina (via bot ou extensão),
// o servidor emite o evento "meetingEnded" e o banner aparece.
function conectarSSE() {
  try {
    const es = new EventSource(`${API_URL}/api/events`);

    es.addEventListener('meetingEnded', () => {
      // Mostra banner de nova reunião disponível
      const banner = document.getElementById('new-meeting-banner');
      banner.classList.remove('hidden');
      document.getElementById('banner-text').innerText =
        '✅ Uma reunião foi concluída e está disponível na lista!';
      // Também faz scroll para o topo para o banner ficar visível
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    es.onerror = () => {
      es.close();
      // Tenta reconectar após 10s
      setTimeout(conectarSSE, 10000);
    };

  } catch (_) {
    // SSE não suportado — sem problema, lista funciona normalmente
  }
}

conectarSSE();
loadMeetings();

</script>

</body>
</html>
