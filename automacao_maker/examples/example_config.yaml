# Configuração de Exemplo para Testar a Aplicação Sample
# Este arquivo demonstra como configurar o framework para testar um sistema

# Configurações do Sistema Alvo
target:
  name: "Aplicação de Exemplo"
  base_url: "http://localhost:8000"
  api_endpoints:
    - "/api/health"
    - "/api/users"
    - "/api/products"
  web_endpoints:
    - "/"
    - "/api/search"
    - "/dashboard"

# Configurações de Testes de Performance
performance:
  enabled: true
  
  # Teste de Carga
  load_test:
    enabled: true
    users: 50          # Número reduzido para exemplo
    duration: 30       # 30 segundos
    ramp_up: 5         # 5 segundos de ramp-up
    
  # Teste de Stress
  stress_test:
    enabled: true
    start_users: 10
    max_users: 100     # Número reduzido para exemplo
    step_users: 20
    step_duration: 15  # 15 segundos por step
    
  # Teste de Spike
  spike_test:
    enabled: true
    normal_users: 5
    spike_users: 50
    spike_duration: 10
    
  # Métricas de Performance
  thresholds:
    response_time_p95: 500
    response_time_p99: 1000
    error_rate: 0.05
    requests_per_second: 50

# Configurações de Testes de Segurança
security:
  enabled: true
  
  # Testes de Vulnerabilidades Web
  web_vulnerabilities:
    enabled: true
    tests:
      - sql_injection
      - xss
      - security_headers
      - ssl_tls
      - cors
      
  # Testes de Autenticação e Autorização
  auth_tests:
    enabled: true
    tests:
      - weak_passwords
      - rate_limiting
      
  # Scan de Portas e Serviços
  network_scan:
    enabled: true
    ports: [8000, 8080, 443]
    
  # Testes de Injeção
  injection_tests:
    enabled: true
    types:
      - command_injection

# Configurações de Relatórios
reporting:
  output_dir: "./reports"
  formats:
    - html
    - json
  include_screenshots: false
  include_metrics: true
  
# Configurações Gerais
general:
  timeout: 10
  retry_attempts: 2
  parallel_execution: true
  max_workers: 10
  log_level: "INFO"
  
# Notificações
notifications:
  enabled: false
