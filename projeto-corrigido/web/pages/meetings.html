<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetAI — Reuniões</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="app">

  <div id="sidebar"></div>

  <main class="main">

    <div id="header"></div>

    <div id="meetings-container">
      <div class="loading">Carregando reuniões...</div>
    </div>

    <div id="pagination" class="pagination"></div>

  </main>

</div>

<script type="module">

import { renderSidebar } from '../components/sidebar.js';
import { renderHeader } from '../components/header.js';
import { API_URL } from '../js/config.js';

document.getElementById('sidebar').innerHTML = renderSidebar('meetings');
document.getElementById('header').innerHTML = renderHeader('Reuniões');

let currentPage = 1;

async function loadMeetings(page = 1) {

  const container = document.getElementById('meetings-container');
  container.innerHTML = '<div class="loading">Carregando...</div>';

  try {

    const res = await fetch(`${API_URL}/api/meetings?page=${page}&limit=15`);

    if (!res.ok) throw new Error('Erro ao carregar');

    const data = await res.json();
    const meetings = data.meetings || data; // compatibilidade com array simples

    if (!meetings.length) {
      container.innerHTML = '<div class="empty-msg">Nenhuma reunião gravada ainda.</div>';
      return;
    }

    let html = '<div class="meetings-list">';

    meetings.forEach(m => {

      const date = new Date(m.createdAt).toLocaleString('pt-BR');
      const duration = m.duration ? `${Math.round(m.duration)} min` : 'Em andamento';
      const statusBadge = m.finishedAt
        ? '<span class="badge badge-done">Concluída</span>'
        : '<span class="badge badge-live">🔴 Ao vivo</span>';

      html += `
        <div class="meeting-card">
          <div class="meeting-info">
            <div class="meeting-title">
              ${m.title || 'Reunião'}
              ${statusBadge}
            </div>
            <div class="meeting-meta">
              📅 ${date} &nbsp;·&nbsp; ⏱ ${duration}
              ${m.meetingCode ? `&nbsp;·&nbsp; 🔗 ${m.meetingCode}` : ''}
            </div>
          </div>
          <div class="meeting-actions">
            <a href="transcript.html?id=${m._id}" class="btn-primary">Ver transcrição</a>
            <button class="btn-danger" onclick="deleteMeeting('${m._id}', this)">Excluir</button>
          </div>
        </div>
      `;

    });

    html += '</div>';
    container.innerHTML = html;

    // Paginação
    if (data.totalPages > 1) {
      renderPagination(data.page, data.totalPages);
    }

  } catch (e) {
    container.innerHTML = `<div class="error-msg">❌ Erro ao carregar reuniões. Servidor disponível?</div>`;
  }

}

function renderPagination(current, total) {
  const el = document.getElementById('pagination');
  let html = '';

  if (current > 1) {
    html += `<button onclick="changePage(${current - 1})">← Anterior</button>`;
  }

  html += `<span>Página ${current} de ${total}</span>`;

  if (current < total) {
    html += `<button onclick="changePage(${current + 1})">Próxima →</button>`;
  }

  el.innerHTML = html;
}

window.changePage = (page) => {
  currentPage = page;
  loadMeetings(page);
  window.scrollTo(0, 0);
};

window.deleteMeeting = async (id, btn) => {

  if (!confirm('Excluir esta reunião e suas transcrições?')) return;

  btn.disabled = true;
  btn.innerText = '...';

  try {
    const res = await fetch(`${API_URL}/api/meeting/${id}`, { method: 'DELETE' });
    if (res.ok) {
      btn.closest('.meeting-card').remove();
    } else {
      alert('Erro ao excluir');
      btn.disabled = false;
      btn.innerText = 'Excluir';
    }
  } catch {
    alert('Erro ao excluir');
    btn.disabled = false;
    btn.innerText = 'Excluir';
  }

};

loadMeetings();

</script>

</body>
</html>
