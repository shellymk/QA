<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetAI — Analytics</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="app">

  <div id="sidebar"></div>

  <main class="main">

    <div id="header"></div>

    <div id="analytics">
      <div class="loading">Carregando analytics...</div>
    </div>

  </main>

</div>

<script type="module">

import { renderSidebar } from '../components/sidebar.js';
import { renderHeader } from '../components/header.js';
import { renderCard } from '../components/card.js';
import { API_URL } from '../js/config.js';

document.getElementById('sidebar').innerHTML = renderSidebar('analytics');
document.getElementById('header').innerHTML = renderHeader('Analytics');

async function loadAnalytics() {

  const container = document.getElementById('analytics');

  try {

    const res = await fetch(`${API_URL}/api/analytics`);
    if (!res.ok) throw new Error('Erro');

    const data = await res.json();

    // Cards de métricas
    let html = '<div class="dashboard" style="margin-bottom:30px">';
    html += renderCard('Total de Reuniões', data.meetings, '📹');
    html += renderCard('Horas Gravadas', `${data.hours}h`, '⏱');
    html += renderCard('Participantes únicos', data.users, '👥');
    html += renderCard('Falas transcritas', data.transcripts, '📝');
    html += '</div>';

    // Tabela de reuniões por dia
    if (data.byDay && Object.keys(data.byDay).length > 0) {

      html += '<div class="card" style="margin-top:20px">';
      html += '<h3 style="margin-bottom:16px">📅 Reuniões por dia (últimos 7 dias)</h3>';
      html += '<table class="analytics-table">';
      html += '<thead><tr><th>Data</th><th>Reuniões</th><th>Gráfico</th></tr></thead>';
      html += '<tbody>';

      const maxVal = Math.max(...Object.values(data.byDay));

      Object.entries(data.byDay).forEach(([day, count]) => {
        const pct = maxVal > 0 ? Math.round((count / maxVal) * 100) : 0;
        html += `
          <tr>
            <td>${day}</td>
            <td>${count}</td>
            <td>
              <div class="bar-container">
                <div class="bar" style="width:${pct}%">&nbsp;</div>
              </div>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table></div>';

    } else {
      html += '<div class="empty-msg" style="margin-top:20px">Nenhuma reunião nos últimos 7 dias.</div>';
    }

    container.innerHTML = html;

  } catch (e) {
    container.innerHTML = `<div class="error-msg">❌ Erro ao carregar analytics.</div>`;
  }

}

loadAnalytics();

</script>

</body>
</html>
